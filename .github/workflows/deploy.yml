name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # The hourly data workflow commits with the default GITHUB_TOKEN, which does
  # NOT fire `push` workflows (recursion guard), so it dispatches this workflow
  # explicitly (workflow_dispatch is an allowed exception) — but only when the
  # data actually changed, so we don't rebuild + redeploy on every no-op run.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Deploys are now infrequent (only on real data changes), so if a newer one
  # starts, supersede the older in-flight run rather than queueing behind it —
  # we always want the latest content live, and this avoids pile-ups behind a
  # deployment that GitHub Pages is slow to release.
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx eslint src/ scripts/ --max-warnings=0
      - run: npm run typecheck
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment