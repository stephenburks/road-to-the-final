name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # The hourly data workflow commits with the default GITHUB_TOKEN, and GitHub
  # deliberately does NOT fire `push` workflows for GITHUB_TOKEN pushes (recursion
  # guard). Without this, bot data commits never redeploy and the live site — which
  # serves data baked into the build — goes stale until a human pushes. Deploying
  # after each successful data run closes that gap.
  workflow_run:
    workflows: ['Update World Cup Data']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # For workflow_run triggers, only deploy when the data run actually succeeded.
    # push / workflow_dispatch events have no workflow_run context, so they pass.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx eslint src/ scripts/ --max-warnings=0
      - run: npm run typecheck
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment