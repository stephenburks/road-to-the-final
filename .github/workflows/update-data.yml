name: Update World Cup Data

on:
  schedule:
    # Hourly. GitHub frequently delays scheduled crons by 1-5 hours during
    # peak load, so a tighter cadence gives more reliable coverage. The
    # "commit only if changed" guard prevents empty/noisy commits.
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write   # needed to dispatch the deploy workflow when data changes

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run data update
        run: node scripts/update-data.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update world cup data"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Bot commits push with GITHUB_TOKEN, which does NOT fire `push` workflows
      # (recursion guard) — but workflow_dispatch IS an allowed exception. So we
      # explicitly dispatch the deploy, and only when data actually changed, to
      # avoid rebuilding the site (and hammering the Pages deploy queue) hourly.
      - name: Deploy site when data changed
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Data update failed — ' + new Date().toISOString(),
              body: 'The data update script failed at `' + new Date().toISOString() + '`. Check the [Actions log](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.',
              labels: ['data-update-failure']
            })