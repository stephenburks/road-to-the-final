name: Update World Cup Data

on:
  schedule:
    # 4x/day at 09/15/21/03 UTC (~02/08/14/20 Pacific). Client-side overlays
    # (useLiveScores, useLiveOdds, useLiveTournamentProbs) handle freshness
    # between runs, so the GHA only seeds the baseline + writes snapshots.
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run data update
        run: node scripts/update-data.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit"
            exit 0
          fi
          git commit -m "chore: update world cup data"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Data update failed — ' + new Date().toISOString(),
              body: 'The data update script failed at `' + new Date().toISOString() + '`. Check the [Actions log](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.',
              labels: ['data-update-failure']
            })